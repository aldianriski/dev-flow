name: Validate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Audit baseline
        run: node scripts/audit-baseline.js

      - name: Skill eval
        run: node scripts/eval-skills.js

      - name: Node test suite
        run: node --test scripts/__tests__/*.test.js bin/__tests__/*.test.js
